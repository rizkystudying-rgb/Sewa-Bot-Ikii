<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IKY-STORES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* ====== CSS ANDA TETAP SAMA PERSIS ===== */
        :root { 
            --accent: #00eaff; 
            --bg: #020406; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.1); 
            --dev-color: #ff0055;
            --gold: #ffcc00;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 100px; transition: 0.3s; }
        
        .bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: brightness(0.2) saturate(1.2); pointer-events: none; }
        .overlay-vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); z-index: -1; pointer-events: none; }

        .android-optimized { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        button, .cat-btn, .dock-item, .buy-btn, .claim-btn { min-height: 44px; touch-action: manipulation; }
        input, select, textarea { font-size: 16px !important; }

        #welcome-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s ease-in-out;
            background: radial-gradient(circle at 50% 50%, #0a1a2a, #000000); overflow: hidden;
        }
        #welcome-overlay::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,234,255,0.1) 0%, transparent 70%); animation: rotate 20s linear infinite;
        }
        #welcome-overlay::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--dev-color), var(--gold), transparent); animation: scanline 3s linear infinite;
        }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scanline { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .premium-loader { position: relative; width: 150px; height: 150px; margin-bottom: 30px; z-index: 10; }
        .premium-loader .ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; animation: ringRotate 2s linear infinite; }
        .premium-loader .ring:nth-child(1) { border-top-color: var(--accent); border-bottom-color: var(--dev-color); animation-duration: 2s; }
        .premium-loader .ring:nth-child(2) { border-left-color: var(--gold); border-right-color: var(--accent); width: 110px; height: 110px; top: 20px; left: 20px; animation-duration: 3s; animation-direction: reverse; }
        .premium-loader .ring:nth-child(3) { border-top-color: var(--dev-color); border-bottom-color: var(--gold); width: 70px; height: 70px; top: 40px; left: 40px; animation-duration: 4s; }
        .premium-loader .core { position: absolute; width: 50px; height: 50px; background: linear-gradient(135deg, var(--accent), var(--dev-color)); border-radius: 50%; top: 50px; left: 50px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 20px; font-weight: 900; box-shadow: 0 0 30px var(--accent); animation: pulse 1.5s ease-in-out infinite; }
        @keyframes ringRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 30px var(--accent); } 50% { transform: scale(1.1); box-shadow: 0 0 50px var(--accent), 0 0 50px var(--dev-color); } 100% { transform: scale(1); box-shadow: 0 0 30px var(--accent); } }
        
        .premium-title { font-family: 'Orbitron'; font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 15px; position: relative; z-index: 10; background: linear-gradient(135deg, #fff, var(--accent), var(--dev-color), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(0,234,255,0.3); animation: glow 3s ease-in-out infinite; }
        @keyframes glow { 0% { filter: brightness(1); } 50% { filter: brightness(1.2); } 100% { filter: brightness(1); } }
        
        .premium-subtitle { font-family: 'Orbitron'; font-size: 12px; letter-spacing: 3px; color: #ccc; margin-bottom: 30px; position: relative; z-index: 10; text-transform: uppercase; }
        .premium-subtitle span { color: var(--accent); font-weight: 900; }
        
        .enter-btn { background: rgba(255,255,255,0.03); border: 2px solid var(--accent); color: var(--accent); padding: 15px 40px; font-family: 'Orbitron'; font-size: 12px; font-weight: 900; letter-spacing: 3px; border-radius: 50px; cursor: pointer; transition: 0.3s; position: relative; z-index: 10; overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,234,255,0.2); min-height: 50px; }
        .enter-btn:active { background: var(--accent); color: #000; transform: scale(0.98); }

        header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background: rgba(2,4,6,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .logo { font-family: 'Orbitron'; font-size: 1rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .profile-btn { width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid var(--accent); object-fit: cover; box-shadow: 0 0 10px var(--accent); }

        .app-container { max-width: 480px; margin: 0 auto; padding: 12px; }

        .hero-card { border-radius: 20px; overflow: hidden; margin-bottom: 16px; border: 1px solid var(--glass-border); height: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .slider-wrapper { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .gacha-box { background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,234,255,0.05)); border: 1px solid var(--glass-border); padding: 12px; border-radius: 16px; margin-bottom: 16px; position: relative; overflow: hidden; }
        .gacha-title { font-family: 'Orbitron'; font-size: 11px; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 700; }
        
        .prize-list { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; max-height: 180px; overflow-y: auto; }
        .prize-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: rgba(255,255,255,0.02); border-radius: 6px; font-size: 8px; }
        .prize-item i { width: 14px; color: var(--gold); }
        .prize-item .prize-name { flex: 1; color: #fff; }
        .prize-item .prize-chance { font-size: 7px; padding: 2px 4px; background: rgba(255,204,0,0.2); border-radius: 8px; color: var(--gold); }
        .prize-legendary { border-left: 2px solid #ff00aa; }
        .prize-epic { border-left: 2px solid #aa00ff; }
        .prize-rare { border-left: 2px solid #00aaff; }
        .prize-common { border-left: 2px solid #aaa; }

        .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .cat-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 3px; border-radius: 12px; text-align: center; transition: 0.3s; }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .cat-btn.active i, .cat-btn.active span { color: #000; }
        .cat-btn i { font-size: 1.1rem; margin-bottom: 4px; color: var(--accent); display: block; }
        .cat-btn span { font-size: 8px; font-weight: 700; text-transform: uppercase; font-family: 'Orbitron'; }

        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 14px; margin-bottom: 12px; transition: 0.3s; }
        .card-title { font-family: 'Orbitron'; font-size: 13px; margin-bottom: 4px; letter-spacing: 1px; }
        .price-tag { font-size: 1.3rem; font-weight: 800; color: var(--accent); margin-bottom: 12px; font-family: 'Rajdhani'; }

        .buy-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(90deg, var(--accent), #00b4d8); color: #000; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; font-size: 10px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 234, 255, 0.3); min-height: 44px; }
        .buy-btn:active { transform: scale(0.98); }
        
        .claim-btn { background: linear-gradient(135deg, var(--gold), #ffaa00); color: #000; border: none; padding: 10px; border-radius: 8px; font-family: 'Orbitron'; font-size: 9px; font-weight: 900; cursor: pointer; transition: 0.3s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 8px; min-height: 40px; }
        .claim-btn:active { transform: scale(0.98); }
        .claim-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .dock-nav { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 420px; height: 60px; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 18px; display: flex; align-items: center; z-index: 1000; }
        .dock-item { color: #666; flex: 1; text-align: center; font-size: 9px; font-family: 'Orbitron'; text-decoration: none; font-weight: 700; transition: 0.3s; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dock-item.active { color: var(--accent); }
        .dock-item i { font-size: 1.2rem; margin-bottom: 2px; display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(10px); }
        .modal-content { background: #080a0f; border: 1px solid var(--accent); border-radius: 20px; width: 100%; max-width: 380px; max-height: 80vh; overflow-y: auto; padding: 20px; position: relative; }
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 8px; outline: none; font-size: 16px !important; }

        .color-picker-container { display: flex; gap: 6px; justify-content: center; margin: 12px 0; flex-wrap: wrap; }
        .color-dot { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid rgba(255,255,255,0.15); transition: 0.2s; position: relative; }
        .color-dot:active { transform: scale(0.9); }
        .color-dot.selected::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; font-size: 14px; text-shadow: 0 0 3px rgba(255,255,255,0.5); }
        .color-dot.selected { border: 2px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.4); transform: scale(1.1); }

        .tab-nav { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 5px; }
        .tab-item { white-space: nowrap; padding: 7px 12px; background: var(--glass); border-radius: 8px; font-size: 9px; font-family: 'Orbitron'; cursor: pointer; }
        .tab-item.active { background: var(--dev-color); color: #fff; }

        .payment-detail-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; margin-bottom: 16px; }
        .payment-method { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px; margin: 12px 0; }
        .payment-method i { font-size: 1.3rem; color: var(--gold); }
        .payment-method .method-name { font-weight: 900; color: var(--accent); font-size: 11px; }
        .bank-account { background: linear-gradient(135deg, rgba(0,234,255,0.1), rgba(255,204,0,0.1)); border: 1px solid var(--gold); border-radius: 10px; padding: 12px; text-align: center; margin: 12px 0; }
        .bank-account .account-number { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; color: var(--gold); letter-spacing: 2px; }
        .bank-account .account-name { font-size: 9px; color: #ccc; margin-top: 4px; }
        .upload-section { background: rgba(255,255,255,0.02); border: 2px dashed var(--accent); border-radius: 12px; padding: 16px; text-align: center; margin: 12px 0; cursor: pointer; transition: 0.3s; }
        .upload-section:active { background: rgba(0,234,255,0.05); }
        .upload-section i { font-size: 1.8rem; color: var(--accent); margin-bottom: 8px; }
        .upload-section .file-name { font-size: 8px; color: var(--gold); margin-top: 8px; word-break: break-all; }
        #payment-proof { display: none; }
        .payment-info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--glass-border); }
        .payment-info-row:last-child { border-bottom: none; }
        .payment-info-label { font-size: 9px; color: #ccc; font-family: 'Orbitron'; }
        .payment-info-value { font-size: 11px; font-weight: 900; color: #fff; }
        .payment-info-value.highlight { color: var(--gold); font-size: 13px; }
        .confirm-btn { background: linear-gradient(135deg, var(--gold), #ffaa00); color: #000; border: none; padding: 14px; border-radius: 10px; font-family: 'Orbitron'; font-size: 11px; font-weight: 900; cursor: pointer; transition: 0.3s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 16px; min-height: 48px; }
        .confirm-btn:active { transform: scale(0.98); }
        .qr-code-section { text-align: center; margin: 12px 0; }
        .qr-code-section img { width: 130px; height: 130px; border-radius: 12px; border: 2px solid var(--accent); padding: 4px; background: #fff; }

        .name-tag-container { display: flex; justify-content: center; margin: 12px 0; }
        .name-tag { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 25px; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; position: relative; overflow: hidden; }
        .name-tag.member-tag { background: linear-gradient(135deg, var(--accent), #0088ff); color: #000; box-shadow: 0 0 20px rgba(0,234,255,0.5); border: 1px solid rgba(255,255,255,0.3); }
        .name-tag.developer-tag { background: linear-gradient(135deg, var(--dev-color), #ff4400); color: #000; box-shadow: 0 0 20px rgba(255,0,85,0.5); border: 1px solid rgba(255,255,255,0.3); }
        .name-tag::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg); animation: shine 3s infinite; }
        @keyframes shine { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
        .edit-name-btn { background: var(--glass); border: 1px solid var(--accent); color: var(--accent); padding: 7px 12px; border-radius: 8px; font-size: 8px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 4px; margin-left: 8px; min-height: 36px; }
        .edit-name-btn:active { background: var(--accent); color: #000; }
        .profile-name-section { display: flex; align-items: center; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }

        .julukan-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; background: linear-gradient(135deg, var(--gold), #ffaa00); border-radius: 16px; font-size: 8px; font-weight: 900; color: #000; font-family: 'Orbitron'; box-shadow: 0 0 10px rgba(255,204,0,0.3); margin-left: 4px; }
        .profile-julukan { display: inline-block; padding: 2px 8px; background: linear-gradient(135deg, var(--gold), #ffaa00); border-radius: 12px; color: #000; font-size: 8px; font-weight: 900; font-family: 'Orbitron'; margin-top: 4px; box-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .set-julukan-btn { background: linear-gradient(135deg, var(--gold), #ffaa00); border: none; color: #000; padding: 4px 8px; border-radius: 6px; font-size: 7px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 3px; margin-right: 6px; min-height: 32px; }
        .set-julukan-btn:active { transform: scale(0.95); }

        .members-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding: 12px; background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(0,234,255,0.05)); border-radius: 12px; border: 1px solid var(--glass-border); position: relative; overflow: hidden; }
        .members-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--dev-color), var(--gold)); }
        .members-header-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--dev-color)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #000; box-shadow: 0 0 20px rgba(0,234,255,0.3); }
        .members-stats { display: flex; gap: 8px; margin-bottom: 16px; }
        .stat-card { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 10px; padding: 8px; text-align: center; }
        .stat-card .stat-value { font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: #fff; }
        .members-list { max-height: 280px; overflow-y: auto; padding-right: 4px; margin-bottom: 12px; }
        .members-list::-webkit-scrollbar { width: 3px; }
        .members-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 8px; }
        .members-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 8px; }
        .member-card { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px; margin-bottom: 8px; transition: 0.3s; position: relative; overflow: hidden; }
        .member-card:active { border-color: var(--accent); transform: translateX(3px); }
        .member-card.developer { border-left: 3px solid var(--dev-color); background: linear-gradient(135deg, rgba(255,0,85,0.05), rgba(255,255,255,0.02)); }
        .member-card.member { border-left: 3px solid var(--accent); }
        .member-avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--dev-color)); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: #000; font-weight: 900; box-shado
